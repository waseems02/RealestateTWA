name: Check frontend static assets

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-static-check
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static frontend
        run: |
          mkdir -p frontend/out
          cp frontend/*.html frontend/out/
          cp -R frontend/assets frontend/css frontend/js frontend/out/
          test -f frontend/out/index.html
