<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>פרטי דירה | RoomieFit</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script>
      tailwind.config = {
        theme: { extend: {
          colors: {
            surface: "#f9f9ff", "surface-container-lowest": "#ffffff", "surface-container-low": "#f0f3ff",
            "surface-container": "#e7eeff", "surface-container-high": "#dee8ff", "surface-container-highest": "#d8e3fb",
            "on-surface": "#111c2d", "on-surface-variant": "#464555",
            outline: "#777587", "outline-variant": "#c7c4d8",
            primary: "#3525cd", "on-primary": "#ffffff", "primary-container": "#4f46e5",
            "primary-fixed": "#e2dfff", "on-primary-fixed-variant": "#3323cc",
            "brand-coral": "#FB7185", "brand-coral-dark": "#F43F5E", "brand-telegram": "#229ED9",
          },
          borderRadius: { lg: "0.5rem", xl: "0.75rem", "2xl": "1rem", full: "9999px" },
          spacing: { xs: "4px", sm: "8px", md: "16px", lg: "24px", xl: "40px", "2xl": "64px", "container-max": "1280px" },
          fontFamily: { heading: ["Heebo", "system-ui", "sans-serif"], body: ["Heebo", "system-ui", "sans-serif"] },
        } },
      };
    </script>
    <style>
      body { font-family: "Heebo", system-ui, sans-serif; background-color: #fafaf9; color: #111c2d; }
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
      .custom-shadow { box-shadow: 0 4px 20px -2px rgba(30, 41, 59, 0.05); }
      .skeleton { background: linear-gradient(90deg, #eef0ff 0%, #f6f7ff 50%, #eef0ff 100%); background-size: 200% 100%; animation: shimmer 1.4s infinite linear; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      .leaflet-container { font-family: "Heebo", system-ui, sans-serif; }
    </style>
    <script defer src="js/app.js"></script>
  </head>
  <body class="text-on-surface" data-no-auto-layout>
    <nav class="sticky top-0 z-50 bg-surface-container-lowest/90 backdrop-blur shadow-[0_4px_20px_-2px_rgba(30,41,59,0.05)]">
      <div class="flex justify-between items-center w-full px-lg md:px-xl py-md max-w-container-max mx-auto">
        <div class="flex items-center gap-xl">
          <a href="index.html" class="text-2xl font-heading font-bold">RoomieFit</a>
          <div class="hidden md:flex gap-lg items-center">
            <a href="index.html" class="text-on-surface-variant text-sm hover:text-primary" data-i18n="navHome">בית</a>
            <a href="listings.html" class="text-primary font-bold border-b-2 border-primary pb-1 text-sm" data-i18n="navListings">דירות</a>
            <a href="about.html" class="text-on-surface-variant text-sm hover:text-primary">אודות</a>
                                  </div>
        </div>
        <div class="flex items-center gap-md">
          <button class="bg-surface-container-low px-sm py-xs rounded-full flex items-center gap-xs text-xs font-semibold border border-outline-variant" data-language-toggle type="button">
            <span data-lang-he class="bg-primary text-on-primary px-2 py-0.5 rounded-full">עב</span>
            <span data-lang-en class="px-2 text-on-surface-variant">EN</span>
          </button>
          <span data-auth-area="logged-out"><a href="login.html" class="text-primary font-bold text-sm">כניסה</a></span>
          <span data-auth-area="logged-in" class="flex items-center gap-sm" style="display:none;">
            <a href="add-listing.html" class="bg-brand-coral text-white px-sm py-xs rounded-lg text-xs font-semibold hover:scale-105 transition-all flex items-center gap-xs"><span class="material-symbols-outlined" style="font-size:16px;">add</span>פרסם</a>
            <div class="relative">
              <button type="button" id="rfUserBtn" class="w-9 h-9 bg-primary text-white rounded-full font-bold text-sm flex items-center justify-center" data-auth-display="initial">?</button>
              <div id="rfUserDrop" class="hidden absolute end-0 mt-2 w-56 bg-white rounded-xl shadow-xl border border-outline-variant py-1 z-50">
                <div class="px-md py-sm border-b border-outline-variant"><div class="font-bold text-sm" data-auth-display="name">—</div><div class="text-xs text-on-surface-variant truncate" data-auth-display="email">—</div></div>
                <a href="my-listings.html" class="block px-md py-sm hover:bg-surface-container-low text-sm">הדירות שלי</a>
                <a href="add-listing.html" class="block px-md py-sm hover:bg-surface-container-low text-sm">פרסום דירה חדשה</a>
                <button type="button" id="rfSignOut" class="block w-full text-start px-md py-sm hover:bg-surface-container-low text-sm text-rose-600 border-t border-outline-variant">יציאה</button>
              </div>
            </div>
          </span>
        </div>
      </div>
    </nav>

    <a href="listings.html" class="block max-w-container-max mx-auto px-lg md:px-xl pt-md text-sm text-on-surface-variant hover:text-primary">
      <span class="material-symbols-outlined align-middle rtl:rotate-180">arrow_back</span>
      <span class="align-middle">חזרה לכל הדירות</span>
    </a>

    <main id="detailRoot" class="max-w-container-max mx-auto px-lg md:px-xl py-lg space-y-xl pb-32">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-md md:h-[300px]">
        <div class="md:col-span-3 h-64 md:h-full skeleton rounded-2xl"></div>
        <div class="grid grid-cols-3 md:grid-cols-1 gap-md">
          <div class="skeleton rounded-2xl h-20 md:h-full"></div>
          <div class="skeleton rounded-2xl h-20 md:h-full"></div>
          <div class="skeleton rounded-2xl h-20 md:h-full"></div>
        </div>
      </div>
      <div class="grid lg:grid-cols-3 gap-xl">
        <div class="lg:col-span-2 space-y-md">
          <div class="h-12 w-2/3 skeleton rounded"></div>
          <div class="h-8 w-1/3 skeleton rounded"></div>
          <div class="h-40 skeleton rounded-2xl"></div>
        </div>
        <div class="space-y-md">
          <div class="h-32 skeleton rounded-2xl"></div>
          <div class="h-64 skeleton rounded-2xl"></div>
        </div>
      </div>
    </main>

    <div id="stickyBar" class="fixed bottom-0 left-0 right-0 z-[60] p-md flex justify-center pointer-events-none hidden">
      <div class="bg-surface-container-lowest/90 backdrop-blur-xl px-xl py-md rounded-2xl shadow-[0_10px_30px_-4px_rgba(30,41,59,0.15)] border border-surface-container-high pointer-events-auto flex items-center gap-xl max-w-3xl w-full justify-between">
        <div class="hidden md:block">
          <p class="text-xs text-on-surface-variant">סך הכל לחודש</p>
          <p class="font-heading text-2xl font-bold text-primary" id="stickyPrice">—</p>
        </div>
        <button id="contactBtn" type="button" class="bg-brand-coral hover:bg-brand-coral-dark text-white px-2xl py-md rounded-xl font-bold text-base active:scale-95 transition-all shadow-lg flex-1 md:flex-none text-center">
          צור קשר / בקש מידע
        </button>
      </div>
    </div>

    <footer class="bg-surface border-t border-surface-container">
      <div class="w-full px-lg md:px-xl py-xl max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center gap-md text-xs text-on-surface-variant">
        <span>RoomieFit · פרויקט קורס מסדי נתונים · נתוני דמו בלבד</span>
        <span>© 2026</span>
      </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/listing-details.js"></script>
    <script src="/api/config.js"></script>
    <script src="js/auth.js" defer></script>
    <script src="js/chat-widget.js" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("rfUserBtn");
        const drop = document.getElementById("rfUserDrop");
        if (btn && drop) {
          btn.addEventListener("click", (e) => { e.stopPropagation(); drop.classList.toggle("hidden"); });
          document.addEventListener("click", () => drop.classList.add("hidden"));
        }
        const out = document.getElementById("rfSignOut");
        if (out) out.addEventListener("click", async () => { await window.RfAuth?.signOut(); location.href = "index.html"; });
      });
    </script>
  </body>
</html>
