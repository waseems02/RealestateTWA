<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>עוזר AI | RoomieFit</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/app.js"></script>
    <script defer src="js/ai.js"></script>
  </head>
  <body>
    <main class="container section">
      <h1 class="page-title">שיחה עם AI</h1>
      <p class="lead">העוזר עוזר להשוות דירות, להבין פשרות ולשאול שאלות חכמות לפני חתימה.</p>
      <section class="panel">
        <div id="chatBox" class="chat-box" aria-live="polite"></div>
        <form id="chatForm" class="chat-form">
          <input id="message" type="text" placeholder="לדוגמה: איזו דירה עדיפה ליד גבעת רם בתקציב 3000?" />
          <button class="button primary" type="submit">שליחה</button>
        </form>
      </section>
    </main>
  </body>
</html>
