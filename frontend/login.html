<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>כניסה | RoomieFit</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: { extend: {
          colors: {
            surface: "#f9f9ff", "surface-container-low": "#f0f3ff", "surface-container-high": "#dee8ff",
            "on-surface": "#111c2d", "on-surface-variant": "#464555",
            outline: "#777587", "outline-variant": "#c7c4d8",
            primary: "#3525cd", "on-primary": "#ffffff", "primary-container": "#4f46e5",
            "brand-coral": "#FB7185", "brand-coral-dark": "#F43F5E",
          },
          borderRadius: { "2xl": "1rem" },
          fontFamily: { heading: ["Heebo", "system-ui", "sans-serif"], body: ["Heebo", "system-ui", "sans-serif"] },
        } },
      };
    </script>
    <style>
      body { font-family: "Heebo", system-ui, sans-serif; background: radial-gradient(circle at top right, #e2dfff 0%, #fafaf9 60%); min-height: 100vh; color: #111c2d; }
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    </style>
    <script src="/api/config.js"></script>
    <script src="js/auth.js" defer></script>
  </head>
  <body>
    <nav class="w-full px-lg md:px-12 py-4">
      <a href="index.html" class="text-2xl font-heading font-bold">RoomieFit</a>
    </nav>

    <main class="max-w-md mx-auto px-6 py-12">
      <div class="bg-white rounded-2xl shadow-xl p-8 border border-surface-container-high">
        <div class="text-center mb-6">
          <div class="inline-flex w-14 h-14 bg-primary text-white rounded-2xl items-center justify-center mb-3">
            <span class="material-symbols-outlined" style="font-size: 28px;">login</span>
          </div>
          <h1 class="font-heading font-bold text-2xl">ברוך/ה הבא/ה</h1>
          <p class="text-sm text-on-surface-variant mt-1">היכנס/י כדי להתחיל לחפש דירה או לפרסם משלך</p>
        </div>

        <form id="loginForm" class="space-y-4" novalidate>
          <label class="block">
            <span class="text-sm font-semibold">אימייל</span>
            <input id="email" type="email" required autocomplete="email"
              class="mt-1 w-full bg-surface-container-low border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary focus:bg-white"
              placeholder="student@example.com" />
          </label>
          <label class="block">
            <span class="text-sm font-semibold">סיסמה</span>
            <input id="password" type="password" required autocomplete="current-password" minlength="6"
              class="mt-1 w-full bg-surface-container-low border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary focus:bg-white"
              placeholder="לפחות 6 תווים" />
          </label>

          <div id="errBox" class="hidden bg-rose-50 border border-rose-200 text-rose-700 text-sm rounded-xl px-4 py-3"></div>

          <button id="submitBtn" type="submit"
            class="w-full bg-primary hover:bg-primary-container text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 disabled:opacity-60">
            <span id="btnLabel">כניסה</span>
          </button>
        </form>

        <div class="mt-6 text-center text-sm text-on-surface-variant">
          עוד אין לך חשבון?
          <a href="register.html" class="text-primary font-bold hover:underline">הירשם/י כאן</a>
        </div>
      </div>

      <a href="index.html" class="block text-center mt-6 text-sm text-on-surface-variant hover:text-primary">
        ← חזרה לדף הבית
      </a>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const errBox = document.getElementById("errBox");
      const btn = document.getElementById("submitBtn");
      const btnLabel = document.getElementById("btnLabel");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errBox.classList.add("hidden");
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (!email || !password) {
          errBox.textContent = "נא למלא אימייל וסיסמה.";
          errBox.classList.remove("hidden");
          return;
        }
        btn.disabled = true;
        btnLabel.textContent = "נכנס/ת...";
        try {
          await window.RfAuth.signIn(email, password);
          const next = new URLSearchParams(location.search).get("next") || "index.html";
          location.href = next;
        } catch (err) {
          const msg = err?.message || "שגיאה לא ידועה";
          errBox.textContent =
            msg.toLowerCase().includes("invalid login")
              ? "אימייל או סיסמה שגויים."
              : msg.toLowerCase().includes("email not confirmed")
                ? "האימייל עדיין לא אומת. בדוק/י את תיבת הדואר."
                : "כניסה נכשלה: " + msg;
          errBox.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btnLabel.textContent = "כניסה";
        }
      });
    </script>
  </body>
</html>
